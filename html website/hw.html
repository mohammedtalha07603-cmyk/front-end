<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Login Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#6a11cb,#2575fc);
}

.login-box{
    width:350px;
    padding:40px;
    background:rgba(255,255,255,0.15);
    border-radius:20px;
    backdrop-filter:blur(12px);
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    color:white;
    text-align:center;
}

.login-box h1{
    margin-bottom:10px;
    font-size:32px;
}

.login-box p{
    margin-bottom:25px;
    color:#f1f1f1;
}

.input-box{
    margin:18px 0;
}

.input-box input{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:30px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:30px;
    background:#ff4b8b;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ff2d75;
    transform:scale(1.05);
}

.links{
    margin-top:20px;
}

.links a{
    color:white;
    text-decoration:none;
}

.links a:hover{
    text-decoration:underline;
}
</style>

</head>
<body>

<div class="login-box">

    <h1>Welcome</h1>
    <p>Sign in to continue</p>

    <form>

        <div class="input-box">
            <input type="text" placeholder="Username" required>
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password" required>
        </div>

        <button type="submit">Login</button>

    </form>

    <div class="links">
        <p><a href="#">Forgot Password?</a></p>
        <p>New User? <a href="#">Create Account</a></p>
    </div>

</div>

</body>
</html>
