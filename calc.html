<!DOCTYPE html>
<html>
<head>
    <title>🌈 Neon Calculator</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:linear-gradient(135deg,#ff00cc,#3333ff,#00e5ff,#00ff99);
            background-size:400% 400%;
            animation:bg 8s infinite alternate;
        }

        @keyframes bg{
            0%{background-position:0% 50%;}
            100%{background-position:100% 50%;}
        }

        .calculator{
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(15px);
            padding:25px;
            border-radius:30px;
            box-shadow:0 10px 30px rgba(0,0,0,0.4);
        }

        h1{
            color:white;
            text-align:center;
            margin-bottom:15px;
        }

        #display{
            width:100%;
            height:70px;
            border:none;
            border-radius:15px;
            font-size:30px;
            text-align:right;
            padding:10px;
            margin-bottom:20px;
            background:#111;
            color:#00ff99;
        }

        .buttons{
            display:grid;
            grid-template-columns:repeat(4,70px);
            gap:12px;
        }

        button{
            height:70px;
            border:none;
            border-radius:20px;
            font-size:25px;
            color:white;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:scale(1.1) rotate(5deg);
        }

        .num{background:linear-gradient(45deg,#00c6ff,#0072ff);}
        .op{background:linear-gradient(45deg,#ff512f,#dd2476);}
        .eq{background:linear-gradient(45deg,#00ff99,#00b894);}
        .clr{background:linear-gradient(45deg,#ff9800,#ff5722);}
    </style>
</head>

<body>

<div class="calculator">
    <h1>🧮 Neon Calculator</h1>

    <input type="text" id="display" readonly>

    <div class="buttons">
        <button class="num" onclick="addValue('7')">7</button>
        <button class="num" onclick="addValue('8')">8</button>
        <button class="num" onclick="addValue('9')">9</button>
        <button class="op" onclick="addValue('/')">÷</button>

        <button class="num" onclick="addValue('4')">4</button>
        <button class="num" onclick="addValue('5')">5</button>
        <button class="num" onclick="addValue('6')">6</button>
        <button class="op" onclick="addValue('*')">×</button>

        <button class="num" onclick="addValue('1')">1</button>
        <button class="num" onclick="addValue('2')">2</button>
        <button class="num" onclick="addValue('3')">3</button>
        <button class="op" onclick="addValue('-')">−</button>

        <button class="num" onclick="addValue('0')">0</button>
        <button class="clr" onclick="clearDisplay()">C</button>
        <button class="eq" onclick="calculate()">=</button>
        <button class="op" onclick="addValue('+')">+</button>
    </div>
</div>

<script>
function addValue(value){
    document.getElementById("display").value += value;
}

function clearDisplay(){
    document.getElementById("display").value = "";
}

function calculate(){
    try{
        document.getElementById("display").value =
        eval(document.getElementById("display").value);
    }
    catch{
        document.getElementById("display").value = "Error";
    }
}
</script>

</body>
</html>
